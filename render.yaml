services:
  - type: web
    name: rag-chatbot-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: APIFY_API_TOKEN
        sync: false
      - key: APIFY_ACTOR_ID
        value: apify~instagram-scraper
      - key: CHROMA_PERSIST_DIR
        value: ./chroma_db
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: GROQ_LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: FRONTEND_ORIGIN
        sync: false